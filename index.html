<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teclado musical online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Teclado Musical Online</h1>
        <button id="start-btn">Encender Teclado</button>
        
        <div id="piano">
            <div class="key white" data-note="C"><span>A</span></div>
            <div class="key black" data-note="Db"><span>W</span></div>
            <div class="key white" data-note="D"><span>S</span></div>
            <div class="key black" data-note="Eb"><span>E</span></div>
            <div class="key white" data-note="E"><span>D</span></div>
            <div class="key white" data-note="F"><span>F</span></div>
            <div class="key black" data-note="Gb"><span>T</span></div>
            <div class="key white" data-note="G"><span>G</span></div>
            <div class="key black" data-note="Ab"><span>Y</span></div>
            <div class="key white" data-note="A"><span>H</span></div>
            <div class="key black" data-note="Bb"><span>U</span></div>
            <div class="key white" data-note="B"><span>J</span></div>
        </div>
        
        <p>Usa el ratón o las teclas indicadas</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
